<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="500" height="530" viewBox="0 0 500 530"
     font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace">

  <rect width="500" height="530" fill="#ffffff"/>

  <!-- Connectors (drawn behind nodes) -->
  <g stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- html → head | body -->
    <line x1="250" y1="70" x2="250" y2="97"/>
    <polyline points="250,97 110,97 110,100"/>
    <polyline points="250,97 390,97 390,100"/>

    <!-- head → meta -->
    <polyline points="110,155 110,172 105,172 105,180"/>
    <!-- head → title -->
    <polyline points="110,155 110,242 105,242 105,250"/>

    <!-- body → h1 -->
    <polyline points="390,155 390,172 375,172 375,180"/>
    <!-- body → p -->
    <polyline points="390,155 390,242 375,242 375,250"/>
    <!-- body → ol -->
    <polyline points="390,155 390,312 375,312 375,320"/>

    <!-- ol → li (共用 stem 後分叉) -->
    <line x1="375" y1="375" x2="375" y2="382"/>
    <polyline points="375,382 380,382 380,390"/>
    <polyline points="375,382 375,452 380,452 380,460"/>
  </g>

  <!-- Branch junction dots -->
  <g fill="#9ca3af">
    <circle cx="250" cy="97"  r="2.5"/>
    <circle cx="375" cy="382" r="2.5"/>
  </g>

  <!-- html — purple -->
  <rect x="155" y="15"  width="190" height="55" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="250" y="37" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b21a8">html</text>
  <text x="250" y="57" text-anchor="middle" font-size="10.5" fill="#7e22ce">&lt;html lang="zh-TW"&gt;</text>

  <!-- head — amber -->
  <rect x="15"  y="100" width="190" height="55" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="110" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">head</text>
  <text x="110" y="142" text-anchor="middle" font-size="10.5" fill="#92400e">&lt;head&gt;</text>

  <!-- body — amber -->
  <rect x="295" y="100" width="190" height="55" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="390" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">body</text>
  <text x="390" y="142" text-anchor="middle" font-size="10.5" fill="#92400e">&lt;body&gt;</text>

  <!-- meta — green -->
  <rect x="10"  y="180" width="190" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="105" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">meta</text>
  <text x="105" y="222" text-anchor="middle" font-size="10.5" fill="#14532d">&lt;meta charset="UTF-8" /&gt;</text>

  <!-- title — green -->
  <rect x="10"  y="250" width="190" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="105" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">title</text>
  <text x="105" y="292" text-anchor="middle" font-size="10.5" fill="#14532d">&lt;title&gt;我的第一個網頁&lt;/title&gt;</text>

  <!-- h1 — blue -->
  <rect x="280" y="180" width="190" height="55" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="375" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">h1</text>
  <text x="375" y="222" text-anchor="middle" font-size="10.5" fill="#1e3a8a">&lt;h1&gt;哈囉，世界！&lt;/h1&gt;</text>

  <!-- p — blue -->
  <rect x="280" y="250" width="190" height="55" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="375" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">p</text>
  <text x="375" y="292" text-anchor="middle" font-size="10.5" fill="#1e3a8a">&lt;p&gt;這是一個段落。&lt;/p&gt;</text>

  <!-- ol — blue -->
  <rect x="280" y="320" width="190" height="55" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="375" y="342" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">ol</text>
  <text x="375" y="362" text-anchor="middle" font-size="10.5" fill="#1e3a8a">&lt;ol&gt;</text>

  <!-- li 1 — pink -->
  <rect x="285" y="390" width="190" height="55" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="380" y="412" text-anchor="middle" font-size="13" font-weight="bold" fill="#831843">li</text>
  <text x="380" y="432" text-anchor="middle" font-size="10.5" fill="#831843">&lt;li&gt;項目一&lt;/li&gt;</text>

  <!-- li 2 — pink -->
  <rect x="285" y="460" width="190" height="55" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="380" y="482" text-anchor="middle" font-size="13" font-weight="bold" fill="#831843">li</text>
  <text x="380" y="502" text-anchor="middle" font-size="10.5" fill="#831843">&lt;li&gt;項目二&lt;/li&gt;</text>

</svg>

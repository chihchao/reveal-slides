<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簡報</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <style>
      :root {
        --navy:    #1A2E5C;
        --blue:    #2D4A8A;
        --card:    #E8EDF8;
        --white:   #FFFFFF;
        --text:    #1A2035;
        --muted:   #5A6478;
        --divider: #C8D3E8;
        --font:    "Calibri", "Arial", "Helvetica Neue", sans-serif;
      }

      .reveal {
        font-family: var(--font);
        background: #d8dce6;
      }

      /* ── 全域基底 ─────────────────────────────────────────── */
      .reveal .slides section {
        background: var(--white);
        color: var(--text);
        font-family: var(--font);
        padding: 62px 60px 52px;
        box-sizing: border-box;
        text-align: left;
        height: 100%;
        top: 0; left: 0;
        position: absolute;
        overflow: hidden;
      }

      /* 頂部色條 */
      .reveal .slides section::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: var(--navy);
        z-index: 10;
      }

      /* 禁止斜體 */
      .reveal .slides section *,
      .reveal .slides section em,
      .reveal .slides section i { font-style: normal !important; }

      /* ── 標題 ────────────────────────────────────────────── */
      .reveal .slides section h1,
      .reveal .slides section h2,
      .reveal .slides section h3 {
        text-transform: none;
        letter-spacing: normal;
        margin-block-start: 0;
      }

      .reveal .slides section h1 {
        font-size: 30px;
        font-weight: 700;
        color: var(--navy);
        border-left: 5px solid var(--navy);
        padding-left: 14px;
        margin: 0 0 10px;
        line-height: 1.3;
      }

      .reveal .slides section h2 {
        font-size: 18px;
        font-weight: 700;
        color: var(--navy);
        margin: 0 0 8px;
      }

      .reveal .slides section h3 {
        font-size: 14px;
        font-weight: 700;
        color: var(--navy);
        margin: 0 0 6px;
      }

      /* ── hr ─────────────────────────────────────────────── */
      .reveal .slides section hr {
        border: none;
        border-top: 1.5px solid var(--divider);
        margin: 0 0 20px;
      }

      /* ── 正文 ────────────────────────────────────────────── */
      .reveal .slides section p {
        font-size: 15px;
        color: var(--text);
        line-height: 1.65;
        margin: 0 0 10px;
      }

      .reveal .slides section ul,
      .reveal .slides section ol {
        font-size: 15px;
        color: var(--text);
        line-height: 1.7;
        padding-left: 22px;
        margin: 0 0 10px;
        display: block;
      }

      .reveal .slides section li { margin-bottom: 4px; }

      .reveal .slides section em     { color: var(--blue); font-weight: 600; }
      .reveal .slides section strong { font-weight: 700; color: var(--navy); }
      .reveal .slides section a      { color: var(--blue); text-decoration: none; }

      /* ── blockquote 卡片塊 ──────────────────────────────── */
      .reveal .slides section blockquote {
        background: var(--card);
        border-left: 5px solid var(--navy);
        border-top: none; border-right: none; border-bottom: none;
        padding: 14px 20px;
        margin: 0 0 12px;
        box-shadow: 1px 2px 6px rgba(0,0,0,.06);
        width: auto;
        font-style: normal;
      }

      .reveal .slides section blockquote p {
        font-size: 14px;
        margin: 0;
        color: var(--text);
      }

      .reveal .slides section blockquote > p:first-child strong {
        display: block;
        font-size: 13px;
        color: var(--navy);
        margin-bottom: 5px;
      }

      /* ── 表格 ────────────────────────────────────────────── */
      .reveal .slides section table {
        border-collapse: collapse;
        width: 100%;
        font-size: 14px;
      }

      .reveal .slides section thead tr { background: var(--navy); }

      .reveal .slides section thead th {
        color: #fff;
        font-weight: 700;
        padding: 9px 14px;
        text-align: left;
        border: none;
      }

      .reveal .slides section tbody tr:nth-child(odd)  { background: var(--white); }
      .reveal .slides section tbody tr:nth-child(even) { background: var(--card); }

      .reveal .slides section tbody td {
        padding: 8px 14px;
        border-bottom: 1px solid var(--divider);
        color: var(--text);
      }

      /* ── code ────────────────────────────────────────────── */
      .reveal .slides section code {
        background: var(--card);
        color: var(--navy);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: .88em;
      }

      .reveal .slides section pre {
        background: var(--card);
        border-left: 5px solid var(--navy);
        padding: 16px 20px;
        margin: 0 0 16px;
        box-shadow: none;
        width: auto;
      }

      .reveal .slides section pre code,
      .reveal .slides section pre .hljs {
        background: transparent;
        padding: 0;
        color: var(--text);
        font-size: 14px;
        max-height: none;
        border-radius: 0;
      }

      /* ════════════════════════════════════════════════════════
         版型 1：封面  class="cover"
         ════════════════════════════════════════════════════════ */
      .reveal .slides section.cover {
        border-left: 8px solid var(--navy);
        padding-left: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .reveal .slides section.cover::before { display: none; }

      .reveal .slides section.cover h1 {
        font-size: 52px;
        border-left: none;
        padding-left: 0;
        margin-bottom: 8px;
        line-height: 1.15;
      }

      .reveal .slides section.cover h2 {
        font-size: 16px;
        font-weight: 400;
        color: var(--muted);
        margin-bottom: 0;
      }

      .reveal .slides section.cover hr {
        width: 480px;
        margin: 24px 0 18px;
      }

      .reveal .slides section.cover p {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      /* ════════════════════════════════════════════════════════
         版型 2：章節標題  class="section-page"
         ════════════════════════════════════════════════════════ */
      .reveal .slides section.section-page {
        border-left: 8px solid var(--navy);
        padding-left: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .reveal .slides section.section-page::before { display: none; }

      .reveal .slides section.section-page h1 {
        font-size: 44px;
        border-left: none;
        padding-left: 0;
        position: relative;
        z-index: 2;
        margin-bottom: 6px;
      }

      .reveal .slides section.section-page hr {
        width: 380px;
        margin: 10px 0 14px;
        position: relative;
        z-index: 2;
      }

      .reveal .slides section.section-page p {
        font-size: 14px;
        color: var(--muted);
        position: relative;
        z-index: 2;
      }

      .reveal .slides section.section-page .num {
        position: absolute;
        right: 56px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 210px;
        font-weight: 700;
        color: var(--card);
        line-height: 1;
        z-index: 1;
        user-select: none;
      }

      /* ════════════════════════════════════════════════════════
         版型 3：兩欄比較  class="cols"
         ════════════════════════════════════════════════════════ */
      .reveal .slides section.cols .col-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .reveal .slides section.cols .col {
        background: var(--card);
        border-left: 5px solid var(--navy);
        padding: 18px 20px;
      }

      .reveal .slides section.cols .col.alt {
        background: var(--white);
        border: 1.5px solid var(--divider);
        border-left: 5px solid var(--divider);
      }

      .reveal .slides section.cols .col h2 {
        font-size: 16px;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--divider);
      }

      .reveal .slides section.cols .col p,
      .reveal .slides section.cols .col li { font-size: 14px; }

      /* ════════════════════════════════════════════════════════
         版型 4：數據重點  class="stats"
         ════════════════════════════════════════════════════════ */
      .reveal .slides section.stats .stat-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }

      .reveal .slides section.stats .stat {
        background: var(--card);
        padding: 28px 20px 22px;
        text-align: center;
      }

      .reveal .slides section.stats .stat.hi { background: var(--navy); }

      .reveal .slides section.stats .stat .n {
        display: block;
        font-size: 60px;
        font-weight: 700;
        color: var(--navy);
        line-height: 1;
      }

      .reveal .slides section.stats .stat.hi .n { color: #fff; }

      .reveal .slides section.stats .stat hr {
        width: 56%;
        margin: 14px auto 12px;
        border-color: var(--divider);
      }

      .reveal .slides section.stats .stat.hi hr { border-color: #3D5E9C; }

      .reveal .slides section.stats .stat .l {
        display: block;
        font-size: 13px;
        color: var(--muted);
      }

      .reveal .slides section.stats .stat.hi .l { color: #8FACD8; }

      /* ════════════════════════════════════════════════════════
         版型 5：結尾  class="closing"
         ════════════════════════════════════════════════════════ */
      .reveal .slides section.closing {
        border-left: 8px solid var(--navy);
        padding-left: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .reveal .slides section.closing::before { display: none; }

      .reveal .slides section.closing h1 {
        font-size: 52px;
        border-left: none;
        padding-left: 0;
      }

      .reveal .slides section.closing hr {
        width: 480px;
        margin: 20px 0 18px;
      }

      .reveal .slides section.closing p {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      /* ── Reveal.js UI ───────────────────────────────────── */
      .reveal .progress { color: var(--navy); height: 4px; }
      .reveal .controls { color: var(--navy); }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section
          data-markdown
          data-separator="^\n---\n$"
          data-separator-vertical="^\n--\n$"
          data-separator-notes="^Notes:">
          <script type="text/template" id="slide-content"></script>
        </section>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
    <script>
      fetch('slides.md')
        .then(r => r.text())
        .then(text => {
          document.getElementById('slide-content').textContent =
            text.replace(/^---\n[\s\S]*?\n---\n/, '');
          Reveal.initialize({
            hash: true,
            width: 1280,
            height: 720,
            margin: 0.04,
            minScale: 0.2,
            maxScale: 2.0,
            plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
          });
        });
    </script>
  </body>
</html>

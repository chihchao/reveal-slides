<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡報列表</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
        min-height: 100vh;
        padding: 3rem 1.5rem;
      }

      header {
        max-width: 800px;
        margin: 0 auto 3rem;
      }

      header h1 { font-size: 2rem; font-weight: 700; }

      header p {
        margin-top: 0.5rem;
        color: #8b949e;
        font-size: 0.95rem;
      }

      .grid {
        max-width: 800px;
        margin: 0 auto;
        display: grid;
        gap: 1rem;
      }

      .card {
        display: block;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s, background 0.15s;
      }

      .card:hover {
        border-color: #58a6ff;
        background: #1c2128;
      }

      .date {
        font-size: 0.8rem;
        color: #8b949e;
        display: block;
        margin-bottom: 0.35rem;
      }

      .card h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #58a6ff;
      }

      .desc {
        margin-top: 0.4rem;
        font-size: 0.88rem;
        color: #8b949e;
        line-height: 1.5;
      }

      footer {
        max-width: 800px;
        margin: 3rem auto 0;
        font-size: 0.8rem;
        color: #484f58;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>簡報列表</h1>
      <p>共 1 份簡報</p>
    </header>
    <div class="grid">
    <a class="card" href="slides/2024-06-08-hello-world/index.html">
      <div class="card-body">
        <span class="date">2024-06-08</span>
        <h2>Hello World</h2>
        <p class="desc">第一份 Reveal.js 簡報，測試用</p>
      </div>
    </a>
    </div>
    <footer>由 GitHub Actions 自動產生</footer>
  </body>
</html>
